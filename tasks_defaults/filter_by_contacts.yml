# Filter processed emails by sender or recipient contacts.
# Copy to tasks/ and customize for your environment.

root: "C:\\Users\\USERNAME\\OneDrive - JLL\\Desktop\\GRN_Extract2"

# Source subfolder containing processed .msg files (under root)
source_subdir: "GR_Candidates"

# Destination subfolder for filtered emails (under root)
dest_subdir: "Filtered_Emails"

# Contacts to match — email passes if ANY contact appears in From, To, or CC
contacts:
  - "sender@example.com"
  - "gr-team@example.com"
  - "contact@example.com"

# Report filename (placed under root) — .xlsx format
report_file: "report.xlsx"
