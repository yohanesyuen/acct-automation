# Search Excel attachments from Outlook emails for GR numbers in cell content.
# Copy to tasks/ and customize for your environment.

root: "C:\\path\\to\\output"

sender_email:
  - "sender@example.com"

# Optional keyword filter for email subject/body
keyword: "GRN"

# Search strategy: "pattern" (GR regex) or "gr_numbers" (8-digit starting with 2)
search_strategy: "pattern"

# Output subdirectory (under root)
excel_subdir: "Excel_Files"

# Report filename (placed under root)
report_file: "GRN_Report.csv"

# Open output folder when complete
open_folder_on_complete: false
