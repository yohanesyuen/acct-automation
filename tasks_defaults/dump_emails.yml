# Download all emails after a specified date from Inbox and Sent Items.
# Copy to tasks/ and customize for your environment.

root: "C:\\path\\to\\output"

# Only download emails received on or after this date (YYYY-MM-DD)
after_date: "2025-01-01"

# Folders to scan — list of: "inbox", "sent"
folders:
  - "inbox"
  - "sent"

# Subdirectory for raw .msg files (under root)
raw_emails_subdir: "Raw_Emails"
