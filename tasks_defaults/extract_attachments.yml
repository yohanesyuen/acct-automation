# Extract attachments from Outlook emails with flexible filtering.
# Copy to tasks/ and customize for your environment.

root: "C:\\path\\to\\output"

# Outlook folder to search: "inbox" or "sent"
folder: "inbox"

# Sender filter — list of email addresses (any match passes)
# Leave as empty list to skip sender filtering
sender_email: []

# Keyword filter — matches body/subject OR attachment filenames
# Leave as empty list to skip keyword filtering
keyword: []

# File type filter — only save attachments with these extensions
# Leave as empty list to save all file types
file_types: []

# Save email as .msg alongside attachments
save_msg: false

# Output subdirectory (under root)
attachments_subdir: "Attachments"

# Report filename (placed under root)
report_file: "Attachments_Report.csv"
