# Extract attachments from emails matching sender address(es) and keyword criteria.
# Copy to tasks/ and customize for your environment.

root: "C:\\path\\to\\output"

# Outlook folder to search: "inbox" or "sent" (default: inbox)
folder: "inbox"

sender_email:
  - "sender@example.com"

# Keyword filter — list of keywords to match in subject or body (any match passes)
# Leave as empty list to disable keyword filtering
keyword: []

# File type filter — list of extensions to save (e.g. [".xlsx", ".pdf"])
# Leave as empty list to save all file types
file_types: []

# Subdirectories (constructed from root)
attachments_subdir: "Attachments"

# Report filename (placed under root)
report_file: "Attachments_Report.csv"
